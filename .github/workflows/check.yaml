name: Check

on:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    name: check (${{ matrix.go}})
    strategy:
      matrix:
        go: [ 1.24, 1.25, 1.26 ] # TODO(jhorsts): pin digests
    continue-on-error: true
    steps:
      - uses: EarthBuild/actions-setup@fe91fcd2e32deb9fe0dd86a131b51d52096a1d11 # main
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: echo "go_version=${{ matrix.go }}-alpine3.23" >> .arg
      - name: Lint
        run: earth  --ci +lint
      - name: Test
        run: earth --ci +test
      - name: Go Vulnerability Check
        run: earth --ci +govulncheck
