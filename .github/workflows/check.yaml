name: Check

on:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    name: check (${{ matrix.go}})
    strategy:
      matrix:
        go: [ 1.24, 1.25, 1.26 ]
    continue-on-error: true
    steps:
      - uses: EarthBuild/actions-setup@c3d7101aa2728cbf8e1930480c0b00867d495db5 # main
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: echo "go_version=${{ matrix.go }}" >> .arg
      - name: Lint
        run: earth  --ci +lint
      - name: Test
        run: earth --ci +test
      - name: Go Vulnerability Check
        run: earth --ci +govulncheck
